name: Desktop Build (Windows + macOS)

# 仅手动触发或推送 desktop-v* 标签时构建。不影响 GitHub Pages 部署。
on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: windows
          - platform: macos-latest
            label: macos

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            desktop/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      # 注意：不设置 GITHUB_PAGES 环境变量，让 basePath 为空，
      # 桌面端通过本地 HTTP server 提供静态文件，路径必须是根路径。
      - name: Build web (static export)
        working-directory: web
        run: npm run build

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Electron app
        working-directory: desktop
        run: npm run build
        env:
          # electron-builder 默认会尝试发布到 GitHub Release，
          # 我们在这里禁用，避免误发。手动触发时只产 artifact。
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            desktop/dist/*.exe
            desktop/dist/*.msi
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
          if-no-files-found: error
          retention-days: 14
